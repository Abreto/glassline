<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Glassline</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="session-pane">
        <header class="pane-header">
          <div>
            <h1>Glassline</h1>
            <p id="session-count">Loading</p>
          </div>
          <button class="icon-button" id="refresh-button" type="button" title="Refresh" aria-label="Refresh">↻</button>
        </header>
        <div class="session-list" id="session-list"></div>
      </aside>

      <main class="detail-pane">
        <header class="detail-header" id="detail-header"></header>
        <nav class="tabs" aria-label="Session views">
          <button class="tab is-active" type="button" data-view="timeline">Timeline</button>
          <button class="tab" type="button" data-view="raw">Raw</button>
        </nav>
        <section class="timeline" id="timeline-view"></section>
        <section class="raw-view is-hidden" id="raw-view"></section>
      </main>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
